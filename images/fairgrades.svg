<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Fairgrades grade prediction dashboard illustration</title>
  <desc id="desc">A simple academic dashboard illustration showing grade prediction cards, a chart, and tabular results.</desc>
  <rect width="1200" height="720" fill="#f6f8fa"/>
  <rect x="72" y="70" width="1056" height="580" fill="#ffffff" stroke="#d8dee4" stroke-width="3"/>
  <rect x="72" y="70" width="1056" height="86" fill="#eef3f5" stroke="#d8dee4" stroke-width="3"/>
  <text x="112" y="125" fill="#1d252d" font-family="Georgia, Times New Roman, serif" font-size="38" font-weight="700">Fairgrades</text>
  <text x="112" y="190" fill="#596672" font-family="Arial, Helvetica, sans-serif" font-size="22">ML-based grade projection from academic records</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="112" y="235" width="220" height="130" fill="#ffffff" stroke="#d8dee4" stroke-width="3"/>
    <text x="140" y="285" fill="#596672" font-size="20" font-weight="700">Students</text>
    <text x="140" y="335" fill="#1e5c70" font-size="48" font-weight="700">1,248</text>
    <rect x="372" y="235" width="220" height="130" fill="#ffffff" stroke="#d8dee4" stroke-width="3"/>
    <text x="400" y="285" fill="#596672" font-size="20" font-weight="700">Model R2</text>
    <text x="400" y="335" fill="#1e5c70" font-size="48" font-weight="700">0.88</text>
    <rect x="632" y="235" width="220" height="130" fill="#ffffff" stroke="#d8dee4" stroke-width="3"/>
    <text x="660" y="285" fill="#596672" font-size="20" font-weight="700">Data Source</text>
    <text x="660" y="335" fill="#1e5c70" font-size="42" font-weight="700">PDF</text>
  </g>
  <g fill="none" stroke="#d8dee4" stroke-width="2">
    <line x1="112" y1="430" x2="1088" y2="430"/>
    <line x1="112" y1="490" x2="1088" y2="490"/>
    <line x1="112" y1="550" x2="1088" y2="550"/>
    <line x1="112" y1="610" x2="1088" y2="610"/>
    <line x1="340" y1="400" x2="340" y2="630"/>
    <line x1="580" y1="400" x2="580" y2="630"/>
    <line x1="820" y1="400" x2="820" y2="630"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="22">
    <text x="135" y="470" fill="#1d252d">Semester 1</text>
    <text x="380" y="470" fill="#1d252d">8.2</text>
    <text x="620" y="470" fill="#1d252d">8.4</text>
    <text x="860" y="470" fill="#596672">Predicted</text>
    <text x="135" y="530" fill="#1d252d">Semester 2</text>
    <text x="380" y="530" fill="#1d252d">8.6</text>
    <text x="620" y="530" fill="#1d252d">8.5</text>
    <text x="860" y="530" fill="#596672">Predicted</text>
    <text x="135" y="590" fill="#1d252d">Semester 3</text>
    <text x="380" y="590" fill="#1d252d">8.7</text>
    <text x="620" y="590" fill="#1d252d">8.8</text>
    <text x="860" y="590" fill="#596672">Projected</text>
  </g>
  <polyline points="895,337 940,308 985,315 1030,275 1080,250" fill="none" stroke="#1e5c70" stroke-width="8"/>
  <circle cx="895" cy="337" r="9" fill="#1e5c70"/>
  <circle cx="940" cy="308" r="9" fill="#1e5c70"/>
  <circle cx="985" cy="315" r="9" fill="#1e5c70"/>
  <circle cx="1030" cy="275" r="9" fill="#1e5c70"/>
  <circle cx="1080" cy="250" r="9" fill="#1e5c70"/>
</svg>
